apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arabic-sentiment-api-ingress
  labels:
    app: arabic-sentiment-api
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    
    # Rate limiting (adjust as needed)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    
    # Timeout settings for ML inference
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    
    # CORS (if not handled by FastAPI)
    # nginx.ingress.kubernetes.io/enable-cors: "true"
    # nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    
    # Certificate manager for TLS (if using cert-manager)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  
  # TLS configuration
  tls:
  - hosts:
    - api.arabic-sentiment.example.com  # Replace with your domain
    secretName: arabic-sentiment-tls
  
  rules:
  - host: api.arabic-sentiment.example.com  # Replace with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: arabic-sentiment-api
            port:
              number: 80

---
# Alternative: Path-based routing (if hosting multiple services)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arabic-sentiment-api-ingress-path
  labels:
    app: arabic-sentiment-api
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  ingressClassName: nginx
  
  rules:
  - host: api.example.com  # Your main domain
    http:
      paths:
      - path: /sentiment(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: arabic-sentiment-api
            port:
              number: 80
